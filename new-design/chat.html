<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="chat-body">
  <div class="messenger">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="user-profile" id="userProfile">
          <div class="user-avatar" id="myAvatar">Y</div>
          <span class="user-name" id="myName">You</span>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search contacts...">
      </div>
      <nav class="contact-list" id="contactList"></nav>
    </aside>

    <main class="main-panel">
      <div class="chat-header" id="chatHeader">
        <div class="chat-header-left">
          <div class="contact-avatar" id="chatAvatar">S</div>
          <div class="chat-header-info">
            <span class="chat-contact-name" id="chatContactName">Select a contact</span>
            <span class="chat-contact-status" id="chatContactStatus"></span>
          </div>
        </div>

      </div>

      <div class="messages-container" id="messagesContainer">
        <div class="empty-state" id="emptyState">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <p>Select a conversation</p>
          <span>Choose a contact to start chatting</span>
        </div>
      </div>

      <div class="voice-recording-bar" id="voiceBar">
        <div class="waveform">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span class="recording-label">Recording...</span>
        <button class="stop-recording-btn" id="stopRecordingBtn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="3" width="10" height="10" rx="2" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <div class="input-area" id="inputArea">
        <button class="action-btn voice-btn" id="voiceBtn" title="Voice message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>
        <div class="input-wrapper">
          <input type="text" class="text-input" id="textInput" placeholder="Aa" disabled>
          <button class="emoji-btn" title="Emoji" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </button>
        </div>
        <button class="action-btn send-btn" id="sendBtn" title="Send" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </main>

  </div>

  <script>
    const contacts = [
      { id: 'sarah', name: 'Sarah Johnson', status: 'online', avatar: 'S', lastMsg: 'Hey, how are you?', color: '#8b5cf6' },
      { id: 'mike', name: 'Mike Chen', status: 'online', avatar: 'M', lastMsg: 'See you later!', color: '#06b6d4' },
      { id: 'emma', name: 'Emma Williams', status: 'away', avatar: 'E', lastMsg: 'Sounds good 👍', color: '#f43f5e' },
      { id: 'alex', name: 'Alex Rodriguez', status: 'offline', avatar: 'A', lastMsg: 'Meeting at 3pm', color: '#f97316' },
      { id: 'olivia', name: 'Olivia Brown', status: 'online', avatar: 'O', lastMsg: 'On my way!', color: '#10b981' },
    ];

    const initialMessages = {
      sarah: [
        { text: 'Hey! How have you been?', from: 'them' },
        { text: 'I\'m good, thanks! How about you?', from: 'me' },
        { text: 'Doing great! Want to grab coffee this weekend?', from: 'them' },
      ],
      mike: [
        { text: 'The project is almost done', from: 'them' },
        { text: 'Great work! Let me review it', from: 'me' },
        { text: 'Sure, I\'ll send it over', from: 'them' },
      ],
      emma: [
        { text: 'Thanks for the help yesterday!', from: 'them' },
        { text: 'No problem at all!', from: 'me' },
        { text: 'Let me know if you need anything else', from: 'me' },
      ],
      alex: [
        { text: 'Can we reschedule our meeting?', from: 'them' },
        { text: 'Sure, what time works for you?', from: 'me' },
        { text: 'How about 3pm tomorrow?', from: 'them' },
      ],
      olivia: [
        { text: 'I\'m heading to the party now', from: 'them' },
        { text: 'Awesome, see you there!', from: 'me' },
        { text: 'I\'ll save you a seat', from: 'them' },
      ],
    };

    let messages = {};
    for (const c of contacts) {
      messages[c.id] = initialMessages[c.id] ? [...initialMessages[c.id]] : [];
    }

    let currentContact = null;
    const currentUser = localStorage.getItem('chat_user') || 'You';

    const contactList = document.getElementById('contactList');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyState = document.getElementById('emptyState');
    const chatHeader = document.getElementById('chatHeader');
    const chatContactName = document.getElementById('chatContactName');
    const chatContactStatus = document.getElementById('chatContactStatus');
    const chatAvatar = document.getElementById('chatAvatar');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceBar = document.getElementById('voiceBar');
    const stopRecordingBtn = document.getElementById('stopRecordingBtn');
    const inputArea = document.getElementById('inputArea');
    const searchInput = document.getElementById('searchInput');
    const myName = document.getElementById('myName');
    const myAvatar = document.getElementById('myAvatar');

    myName.textContent = currentUser;
    myAvatar.textContent = currentUser.charAt(0).toUpperCase();

    function renderContactList(filter) {
      contactList.innerHTML = '';
      const filtered = filter
        ? contacts.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))
        : contacts;
      filtered.forEach(c => {
        const div = document.createElement('div');
        div.className = 'contact-item' + (currentContact && currentContact.id === c.id ? ' active' : '');
        div.innerHTML = `
          <div class="contact-avatar" style="background:${c.color}">${c.avatar}</div>
          <div class="contact-info">
            <div class="contact-top">
              <span class="contact-name">${c.name}</span>
              <span class="status-indicator ${c.status}"></span>
            </div>
            <span class="contact-preview">${c.lastMsg}</span>
          </div>
        `;
        div.addEventListener('click', () => selectContact(c));
        contactList.appendChild(div);
      });
    }

    function selectContact(contact) {
      currentContact = contact;
      emptyState.style.display = 'none';
      chatHeader.style.display = 'flex';
      inputArea.style.display = 'flex';
      textInput.disabled = false;
      sendBtn.disabled = false;

      chatContactName.textContent = contact.name;
      chatAvatar.textContent = contact.avatar;
      chatAvatar.style.background = contact.color;
      const statusLabels = { online: 'Online', away: 'Away', offline: 'Offline' };
      chatContactStatus.textContent = statusLabels[contact.status] || '';
      chatContactStatus.className = 'chat-contact-status ' + contact.status;

      renderContactList();
      renderMessages();
    }

    function renderMessages() {
      if (!currentContact) return;
      const msgs = messages[currentContact.id] || [];
      messagesContainer.innerHTML = '';
      msgs.forEach((m) => {
        const div = document.createElement('div');
        div.className = 'message ' + (m.from === 'me' ? 'sent' : 'received');
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ':' +
                     now.getMinutes().toString().padStart(2, '0');
        div.innerHTML = `<div class="message-content"><p>${m.text}</p><span class="message-time">${time}</span></div>`;
        messagesContainer.appendChild(div);
      });
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function sendMessage() {
      if (!currentContact) return;
      const text = textInput.value.trim();
      if (!text) return;
      messages[currentContact.id].push({ text, from: 'me' });
      renderMessages();
      textInput.value = '';

      const contact = contacts.find(c => c.id === currentContact.id);
      if (contact) {
        contact.lastMsg = text;
        renderContactList(searchInput.value);
      }

      setTimeout(() => {
        const replies = [
          'That\'s great!', 'I agree 😊', 'Tell me more!', 'Got it, thanks!',
          'Awesome!', 'Sure thing!', 'Haha 😄', 'Let me check on that'
        ];
        const reply = replies[Math.floor(Math.random() * replies.length)];
        messages[currentContact.id].push({ text: reply, from: 'them' });
        renderMessages();
      }, 1200);
    }

    sendBtn.addEventListener('click', sendMessage);
    textInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') sendMessage();
    });

    voiceBtn.addEventListener('click', function () {
      if (!currentContact) return;
      voiceBar.classList.add('active');
    });

    stopRecordingBtn.addEventListener('click', function () {
      voiceBar.classList.remove('active');
      messages[currentContact.id].push({ text: '🎤 Voice message', from: 'me' });
      renderMessages();
      setTimeout(() => {
        messages[currentContact.id].push({ text: 'Got your voice message!', from: 'them' });
        renderMessages();
      }, 800);
    });

    searchInput.addEventListener('input', function () {
      renderContactList(this.value);
    });

    document.getElementById('logoutBtn').addEventListener('click', function () {
      localStorage.removeItem('chat_user');
      window.location.href = 'login.html';
    });

    selectContact(contacts[0]);
  </script>
</body>
</html>
